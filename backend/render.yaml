services:
  - type: web
    name: easyway-api
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: DB_HOST
        value: your-mysql-host
      - key: DB_USER
        value: your-db-user
      - key: DB_PASSWORD
        value: your-db-password
      - key: DB_NAME
        value: easyway_calories
      - key: DB_PORT
        value: "3306"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: PORT
        value: "3001"
